services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: axta-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: axta-postgres
    environment:
      POSTGRES_USER: axta_user
      POSTGRES_PASSWORD: axta_password
      POSTGRES_DB: axta_rag_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: axta-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  ollama_data:

